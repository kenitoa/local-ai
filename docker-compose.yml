# =====================================================
# local-ai docker-compose.yml (초안 / Step 1)
# - 모든 서비스 placeholder. 실제 이미지/빌드 컨텍스트는
#   각 서비스 구현 단계에서 채워 넣습니다.
# =====================================================
name: ${COMPOSE_PROJECT_NAME:-local-ai}

x-common-env: &common-env
  TZ: ${TZ:-Asia/Seoul}
  LOG_LEVEL: ${LOG_LEVEL:-INFO}

x-restart: &restart
  restart: unless-stopped

networks:
  local-ai-net:
    driver: bridge

volumes:
  local-ai-mysql-data:
  local-ai-models:
  local-ai-data:

services:
  # ---------------- Database ----------------
  mysql:
    image: mysql:8.0
    container_name: local-ai-mysql
    <<: *restart
    environment:
      <<: *common-env
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    volumes:
      - local-ai-mysql-data:/var/lib/mysql
      - ./mysql/init:/docker-entrypoint-initdb.d:ro
      - ${LOGS_DIR:-./logs}/mysql:/var/log/mysql
    networks: [local-ai-net]
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ---------------- Backend (API) ----------------
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: local-ai-backend
    <<: *restart
    environment:
      <<: *common-env
      BACKEND_SECRET_KEY: ${BACKEND_SECRET_KEY}
      BACKEND_CORS_ORIGINS: ${BACKEND_CORS_ORIGINS}
      MYSQL_HOST: ${MYSQL_HOST:-mysql}
      MYSQL_PORT: 3306
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MODEL_SERVER_URL: http://model-server:8001
      VISION_SERVER_URL: http://vision-server:8002
      EMBEDDING_SERVER_URL: http://embedding-server:8003
      LANGUAGE_WORKER_URL: http://language-worker:8004
      HARDWARE_DETECTOR_URL: http://hardware-detector:8005
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    volumes:
      - ${DATA_DIR:-./data}:/app/data
      - ${LOGS_DIR:-./logs}/backend:/app/logs
    depends_on:
      mysql:
        condition: service_healthy
    networks: [local-ai-net]
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/health').status==200 else 1)"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 5s

  # ---------------- Web UI ----------------
  web-ui:
    build:
      context: ./web-ui
      dockerfile: Dockerfile
    container_name: local-ai-web-ui
    <<: *restart
    environment:
      <<: *common-env
      BACKEND_URL: http://backend:8000
    ports:
      - "${WEB_UI_PORT:-3000}:3000"
    volumes:
      - ${LOGS_DIR:-./logs}/web-ui:/app/logs
    depends_on:
      backend:
        condition: service_healthy
    networks: [local-ai-net]
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 5s

  # ---------------- Model Server (LLM) ----------------
  model-server:
    build:
      context: ./model-server
      dockerfile: Dockerfile
    container_name: local-ai-model-server
    <<: *restart
    environment:
      <<: *common-env
      MODEL_SERVER_DEVICE: ${MODEL_SERVER_DEVICE:-auto}
      DEFAULT_LLM_MODEL: ${DEFAULT_LLM_MODEL}
    ports:
      - "${MODEL_SERVER_PORT:-8001}:8001"
    volumes:
      - ${MODELS_DIR:-./models}:/app/models
      - ${LOGS_DIR:-./logs}/model-server:/app/logs
    networks: [local-ai-net]
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8001/health').status==200 else 1)"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 5s

  # ---------------- Vision Server ----------------
  vision-server:
    build:
      context: ./vision-server
      dockerfile: Dockerfile
    container_name: local-ai-vision-server
    <<: *restart
    environment:
      <<: *common-env
      DEFAULT_VISION_MODEL: ${DEFAULT_VISION_MODEL}
    ports:
      - "${VISION_SERVER_PORT:-8002}:8002"
    volumes:
      - ${MODELS_DIR:-./models}:/app/models
      - ${LOGS_DIR:-./logs}/vision-server:/app/logs
    networks: [local-ai-net]
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8002/health').status==200 else 1)"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 5s

  # ---------------- Embedding Server ----------------
  embedding-server:
    build:
      context: ./embedding-server
      dockerfile: Dockerfile
    container_name: local-ai-embedding-server
    <<: *restart
    environment:
      <<: *common-env
      DEFAULT_EMBEDDING_MODEL: ${DEFAULT_EMBEDDING_MODEL}
    ports:
      - "${EMBEDDING_SERVER_PORT:-8003}:8003"
    volumes:
      - ${MODELS_DIR:-./models}:/app/models
      - ${LOGS_DIR:-./logs}/embedding-server:/app/logs
    networks: [local-ai-net]
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8003/health').status==200 else 1)"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 5s

  # ---------------- Language Worker ----------------
  language-worker:
    build:
      context: ./language-worker
      dockerfile: Dockerfile
    container_name: local-ai-language-worker
    <<: *restart
    environment:
      <<: *common-env
    ports:
      - "${LANGUAGE_WORKER_PORT:-8004}:8004"
    volumes:
      - ${LOGS_DIR:-./logs}/language-worker:/app/logs
    networks: [local-ai-net]
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8004/health').status==200 else 1)"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 5s

  # ---------------- Hardware Detector ----------------
  hardware-detector:
    build:
      context: ./hardware-detector
      dockerfile: Dockerfile
    container_name: local-ai-hardware-detector
    <<: *restart
    environment:
      <<: *common-env
    ports:
      - "${HARDWARE_DETECTOR_PORT:-8005}:8005"
    volumes:
      - ${LOGS_DIR:-./logs}/hardware-detector:/app/logs
    networks: [local-ai-net]
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8005/health').status==200 else 1)"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 5s
