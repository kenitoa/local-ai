# =====================================================
# local-ai docker-compose.yml (초안 / Step 1)
# - 모든 서비스 placeholder. 실제 이미지/빌드 컨텍스트는
#   각 서비스 구현 단계에서 채워 넣습니다.
# =====================================================
name: ${COMPOSE_PROJECT_NAME:-local-ai}

x-common-env: &common-env
  TZ: ${TZ:-Asia/Seoul}
  LOG_LEVEL: ${LOG_LEVEL:-INFO}

x-restart: &restart
  restart: unless-stopped

# NVIDIA GPU 노출 공통 설정 (nvidia-container-toolkit 필요)
#   - 호스트에 NVIDIA 드라이버 + nvidia-container-toolkit 가 설치되어있어야 함.
#   - GPU 가 없는 호스트에서는 `count: all` 이 0개로 해석되어 에러 없이 CPU 로 동작(fallback).
x-gpu-deploy: &gpu-deploy
  deploy:
    resources:
      reservations:
        devices:
          - driver: nvidia
            count: all
            capabilities: [gpu]

networks:
  local-ai-net:
    driver: bridge

volumes:
  local-ai-mysql-data:
  local-ai-qdrant-data:
  local-ai-models:
  local-ai-data:

services:
  # ---------------- Database ----------------
  mysql:
    image: mysql:8.0
    container_name: local-ai-mysql
    <<: *restart
    environment:
      <<: *common-env
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    volumes:
      - local-ai-mysql-data:/var/lib/mysql
      - ./mysql/init:/docker-entrypoint-initdb.d:ro
      - ${LOGS_DIR:-./logs}/mysql:/var/log/mysql
    networks: [local-ai-net]
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ---------------- Backend (API) ----------------
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: local-ai-backend
    <<: *restart
    environment:
      <<: *common-env
      BACKEND_SECRET_KEY: ${BACKEND_SECRET_KEY}
      BACKEND_API_KEY: ${BACKEND_API_KEY}
      BACKEND_CORS_ORIGINS: ${BACKEND_CORS_ORIGINS}
      MYSQL_HOST: ${MYSQL_HOST:-mysql}
      MYSQL_PORT: 3306
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      DB_POOL_SIZE: ${DB_POOL_SIZE:-5}
      DB_MAX_OVERFLOW: ${DB_MAX_OVERFLOW:-10}
      DB_POOL_RECYCLE_SEC: ${DB_POOL_RECYCLE_SEC:-1800}
      DB_POOL_TIMEOUT_SEC: ${DB_POOL_TIMEOUT_SEC:-30}
      DB_ECHO: ${DB_ECHO:-0}
      MODEL_SERVER_URL: http://model-server:8001
      MODEL_SERVER_GENERATE_TIMEOUT_SEC: ${MODEL_SERVER_GENERATE_TIMEOUT_SEC:-180}
      VISION_SERVER_URL: http://vision-server:8002
      EMBEDDING_SERVER_URL: http://embedding-server:8003
      VECTOR_DB_URL: http://qdrant:6333
      VECTOR_DB_COLLECTION: ${VECTOR_DB_COLLECTION:-localai_embeddings}
      VECTOR_DB_ENABLED: ${VECTOR_DB_ENABLED:-1}
      LANGUAGE_WORKER_URL: http://language-worker:8004
      HARDWARE_DETECTOR_URL: http://hardware-detector:8005
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    volumes:
      - ${DATA_DIR:-./data}:/app/data
      - ${LOGS_DIR:-./logs}/backend:/app/logs
    depends_on:
      mysql:
        condition: service_healthy
      qdrant:
        condition: service_started
    networks: [local-ai-net]
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/health', timeout=2).status==200 else 1)"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 5s

  # ---------------- Web UI ----------------
  web-ui:
    build:
      context: ./web-ui
      dockerfile: Dockerfile
    container_name: local-ai-web-ui
    <<: *restart
    environment:
      <<: *common-env
      BACKEND_URL: http://backend:8000
    ports:
      - "${WEB_UI_PORT:-3000}:3000"
    volumes:
      - ${LOGS_DIR:-./logs}/web-ui:/app/logs
    depends_on:
      backend:
        condition: service_healthy
    networks: [local-ai-net]
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 5s

  # ---------------- Vector DB / ANN Search ----------------
  qdrant:
    image: qdrant/qdrant:v1.11.3
    container_name: local-ai-qdrant
    <<: *restart
    environment:
      <<: *common-env
    ports:
      - "${QDRANT_PORT:-6333}:6333"
      - "${QDRANT_GRPC_PORT:-6334}:6334"
    volumes:
      - local-ai-qdrant-data:/qdrant/storage
      - ${LOGS_DIR:-./logs}/qdrant:/qdrant/logs
    networks: [local-ai-net]

  # ---------------- Model Server (LLM) ----------------
  model-server:
    build:
      context: ./model-server
      dockerfile: Dockerfile
    container_name: local-ai-model-server
    <<: *restart
    environment:
      <<: *common-env
      MODEL_SERVER_DEVICE: ${MODEL_SERVER_DEVICE:-auto}
      LOCAL_CHECKPOINT: ${LOCAL_CHECKPOINT:-self/cold-start}
      BOOTSTRAP_BASE_ID: ${BOOTSTRAP_BASE_ID:-Qwen/Qwen2.5-Coder-1.5B}
      BACKEND_URL: http://backend:8000
      BACKEND_API_KEY: ${BACKEND_API_KEY}
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: compute,utility
    ports:
      - "${MODEL_SERVER_PORT:-8001}:8001"
    volumes:
      - ${MODELS_DIR:-./models}:/app/models
      - ${LOGS_DIR:-./logs}/model-server:/app/logs
    networks: [local-ai-net]
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8001/health', timeout=2).status==200 else 1)"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 5s

  # ---------------- Vision Server ----------------
  vision-server:
    build:
      context: ./vision-server
      dockerfile: Dockerfile
    container_name: local-ai-vision-server
    <<: *restart
    environment:
      <<: *common-env
      DEFAULT_VISION_MODEL: ${DEFAULT_VISION_MODEL}
      OCR_ENGINE: ${OCR_ENGINE:-auto}
      OCR_LANGS: ${OCR_LANGS:-kor+eng}
      OCR_TESSERACT_CONFIG: ${OCR_TESSERACT_CONFIG:---psm 6}
      VISION_VLM_MODEL_PATH: ${VISION_VLM_MODEL_PATH:-}
      VISION_VLM_LOCAL_ONLY: ${VISION_VLM_LOCAL_ONLY:-1}
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: compute,utility
    ports:
      - "${VISION_SERVER_PORT:-8002}:8002"
    volumes:
      - ${MODELS_DIR:-./models}:/app/models
      - ${DATA_DIR:-./data}:/app/data:ro
      - ${LOGS_DIR:-./logs}/vision-server:/app/logs
    networks: [local-ai-net]
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8002/health', timeout=2).status==200 else 1)"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 5s

  # ---------------- Embedding Server ----------------
  embedding-server:
    build:
      context: ./embedding-server
      dockerfile: Dockerfile
    container_name: local-ai-embedding-server
    <<: *restart
    environment:
      <<: *common-env
      DEFAULT_EMBEDDING_MODEL: ${DEFAULT_EMBEDDING_MODEL}
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: compute,utility
    ports:
      - "${EMBEDDING_SERVER_PORT:-8003}:8003"
    volumes:
      - ${MODELS_DIR:-./models}:/app/models
      - ${LOGS_DIR:-./logs}/embedding-server:/app/logs
    networks: [local-ai-net]
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8003/health', timeout=2).status==200 else 1)"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 5s

  # ---------------- Language Worker ----------------
  language-worker:
    build:
      context: ./language-worker
      dockerfile: Dockerfile
    container_name: local-ai-language-worker
    <<: *restart
    environment:
      <<: *common-env
    ports:
      - "${LANGUAGE_WORKER_PORT:-8004}:8004"
    volumes:
      - ${LOGS_DIR:-./logs}/language-worker:/app/logs
    networks: [local-ai-net]
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8004/health', timeout=2).status==200 else 1)"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 5s

  # ---------------- Hardware Detector ----------------
  hardware-detector:
    build:
      context: ./hardware-detector
      dockerfile: Dockerfile
    container_name: local-ai-hardware-detector
    <<: *restart
    environment:
      <<: *common-env
      BACKEND_URL: http://backend:8000
      BACKEND_API_KEY: ${BACKEND_API_KEY}
      STORAGE_PATH: /app/data
      PUSH_ON_STARTUP: "1"
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: compute,utility
    ports:
      - "${HARDWARE_DETECTOR_PORT:-8005}:8005"
    volumes:
      - ${DATA_DIR:-./data}:/app/data:ro
      - ${LOGS_DIR:-./logs}/hardware-detector:/app/logs
    depends_on:
      backend:
        condition: service_healthy
    networks: [local-ai-net]
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8005/health', timeout=2).status==200 else 1)"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 5s
