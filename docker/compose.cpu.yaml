services:
  app:
    environment:
      AI_DEVICE: cpu
      LLM_BACKEND: llama_cpp
      MODEL_BACKEND: cpu
      MODEL_RUNTIME: llama-cpp-python
      LLAMA_CPP_N_CTX: ${LLAMA_CPP_N_CTX:-8192}
      LLAMA_CPP_N_THREADS: ${LLAMA_CPP_N_THREADS:-8}
      LLAMA_CPP_N_GPU_LAYERS: "0"
      LLM_MODEL: ${LLM_MODEL:-local-code-model}

  core-runner:
    environment:
      AI_DEVICE: cpu
      LLM_BACKEND: llama_cpp
      MODEL_BACKEND: cpu
      MODEL_RUNTIME: llama-cpp-python
      LLAMA_CPP_N_CTX: ${LLAMA_CPP_N_CTX:-8192}
      LLAMA_CPP_N_THREADS: ${LLAMA_CPP_N_THREADS:-8}
      LLAMA_CPP_N_GPU_LAYERS: "0"
      LLM_MODEL: ${LLM_MODEL:-local-code-model}
