services:
  app:
    build:
      context: ..
      dockerfile: docker/Dockerfile.cuda
    environment:
      AI_DEVICE: cuda
      LLM_BACKEND: vllm
      MODEL_BACKEND: cuda
      MODEL_RUNTIME: vllm-offline
      VLLM_MODEL_PATH: ${VLLM_MODEL_PATH:-/models/base/code-model}
      VLLM_TENSOR_PARALLEL_SIZE: ${VLLM_TENSOR_PARALLEL_SIZE:-1}
      BASE_MODEL_PATH: ${BASE_MODEL_PATH:-/models/base/code-model}
      LORA_ADAPTER_NAME: ${LORA_ADAPTER_NAME:-code-optimizer-lora}
      LORA_ADAPTER_PATH: ${LORA_ADAPTER_PATH:-/models/adapters/code-optimizer-lora}
      LORA_ENABLED: ${LORA_ENABLED:-0}
      LLM_MODEL: ${LLM_MODEL:-base-code-model}
      HF_HOME: /models/.cache/huggingface
      HF_HUB_CACHE: /models/.cache/huggingface/hub
      HF_TOKEN_PATH: /run/secrets/hf_token
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  core-runner:
    build:
      context: ..
      dockerfile: apps/api/Dockerfile.cuda
    environment:
      AI_DEVICE: cuda
      LLM_BACKEND: vllm
      MODEL_BACKEND: cuda
      MODEL_RUNTIME: vllm-offline
      VLLM_MODEL_PATH: ${VLLM_MODEL_PATH:-/models/base/code-model}
      VLLM_TENSOR_PARALLEL_SIZE: ${VLLM_TENSOR_PARALLEL_SIZE:-1}
      BASE_MODEL_PATH: ${BASE_MODEL_PATH:-/models/base/code-model}
      LORA_ADAPTER_NAME: ${LORA_ADAPTER_NAME:-code-optimizer-lora}
      LORA_ADAPTER_PATH: ${LORA_ADAPTER_PATH:-/models/adapters/code-optimizer-lora}
      LORA_ENABLED: ${LORA_ENABLED:-0}
      LLM_MODEL: ${LLM_MODEL:-base-code-model}
      HF_HOME: /models/.cache/huggingface
      HF_HUB_CACHE: /models/.cache/huggingface/hub
      HF_TOKEN_PATH: /run/secrets/hf_token
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
