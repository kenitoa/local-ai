name: ai-code-optimizer

services:
  app:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    env_file:
      - ../.env
    environment:
      DATA_DIR: /data
      MODEL_PATH: /models
      LLAMA_CPP_MODEL_PATH: ${LLAMA_CPP_MODEL_PATH:-/models/gguf/code-model-q4.gguf}
      EMBEDDING_MODEL_PATH: ${EMBEDDING_MODEL_PATH:-/models/embeddings/code-search}
    volumes:
      - ../projects:/projects
      - model-cache:/models
      - app-data:/data
    secrets:
      - hf_token

  web-local:
    profiles: ["web"]
    build:
      context: ../apps/web
    environment:
      VITE_API_PROXY_TARGET: http://core-runner:8000
    ports:
      - "${WEB_PORT:-3000}:3000"
    depends_on:
      - core-runner

  core-runner:
    profiles: ["web"]
    build:
      context: ..
      dockerfile: apps/api/Dockerfile
    env_file:
      - ../.env
    environment:
      DATA_DIR: /data
      MODEL_PATH: /models
    volumes:
      - ../projects:/projects
      - model-cache:/models
      - app-data:/data
    secrets:
      - hf_token

volumes:
  model-cache:
  app-data:

secrets:
  hf_token:
    file: ../secrets/hf_token.txt
