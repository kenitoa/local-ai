services:
  app:
    volumes:
      - ..:/workspace
      - ../projects:/projects
      - model-cache:/models
      - app-data:/data
    working_dir: /workspace
    entrypoint: ["python", "-m", "adapters.cli.main"]

  core-runner:
    volumes:
      - ../apps/api/app:/app/app
      - ../core:/app/core
      - ../adapters:/app/adapters
      - model-cache:/models
      - app-data:/data
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  web-local:
    build:
      context: ../apps/web
    ports:
      - "${WEB_PORT:-3000}:3000"
    volumes:
      - ../apps/web/src:/app/src
    depends_on:
      - core-runner
