server {
    listen 3000;
    server_name _;

    access_log /var/log/nginx/web-ui.access.log;
    error_log  /var/log/nginx/web-ui.error.log;

    root /usr/share/nginx/html;
    index index.html;

    location = /health {
        default_type application/json;
        return 200 '{"status":"ok"}';
    }

    location / {
        try_files $uri /index.html;
    }
}
